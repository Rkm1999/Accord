name = "accord-chat"
main = "src/index.ts"
compatibility_date = "2025-01-24"
compatibility_flags = ["nodejs_compat"]

# Static Assets
[assets]
directory = "./public"
binding = "ASSETS"

# Environment Variables
[vars]
JWT_SECRET = "super-secret-key-change-me"

# Durable Objects
[[durable_objects.bindings]]
name = "CHAT_ROOM"
class_name = "ChatRoom"

[[durable_objects.bindings]]
name = "PRESENCE"
class_name = "PresenceTracker"

[[migrations]]
tag = "v1" # Should be unique for each entry
new_sqlite_classes = ["ChatRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["PresenceTracker"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "accord"
database_id = "59dd7aa3-afd3-41d4-8765-e1dc3dad2852"

# R2 Storage
[[r2_buckets]]
binding = "FILES"
bucket_name = "accord"

# Observability
[observability]
enabled = true
